<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wan2GP Terminal</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: #1a1a1a; color: #e8e6e1; font-family: 'Geist Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 12px; display: flex; flex-direction: column; }
#termHeader { display: flex; align-items: center; padding: 4px 8px; background: #242424; border-bottom: 1px solid #333; gap: 6px; flex-shrink: 0; -webkit-app-region: drag; min-height: 30px; user-select: none; }
#termTitle { font-size: 11px; font-weight: 600; color: #a0a0a0; flex-shrink: 0; }
.term-actions { margin-left: auto; display: flex; gap: 4px; align-items: center; -webkit-app-region: no-drag; }
.term-actions button { background: #333; color: #a0a0a0; border: 1px solid #444; border-radius: 3px; padding: 2px 10px; font-size: 11px; cursor: pointer; white-space: nowrap; }
.term-actions button:hover { background: #444; color: #e8e6e1; }
.term-actions button.primary { background: #4a4a4a; color: #e8e6e1; border-color: #666; }
.term-actions button.primary:hover { background: #5a5a5a; }
.term-actions button.danger { background: #3a2020; color: #d88; border-color: #633; }
.term-actions button.danger:hover { background: #4a3030; color: #faa; }
#termBody { flex: 1; overflow-y: auto; padding: 6px 10px; white-space: pre-wrap; word-break: break-all; line-height: 1.5; user-select: text; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #555; }
</style>
</head>
<body>
<div id="termHeader">
  <span id="termTitle">Wan2GP Terminal — Floating</span>
  <div class="term-actions">
    <button id="closeBtn">✕ Close</button>
  </div>
</div>
<div id="termBody"></div>
<script>
var logBuffer = []
var MAX_LOG = 2000
var lastLine = ''
function appendLog(text) {
  if (!text) return
  var clean = text.replace(/\x1b\[[0-9;?]*[a-zA-Z]/g, '')
  if (!clean) return
  var parts = clean.split(/(\r|\n)/)
  for (var i = 0; i < parts.length; i++) {
    var part = parts[i]
    if (part === '\r') {
      if (lastLine && logBuffer.length > 0) logBuffer[logBuffer.length - 1] = lastLine
      lastLine = ''
    } else if (part === '\n') {
      if (lastLine.trim()) logBuffer.push(lastLine.trim())
      lastLine = ''
    } else {
      lastLine += part
    }
  }
  while (logBuffer.length > MAX_LOG) logBuffer.shift()
  document.getElementById('termBody').textContent = logBuffer.join('\n')
  setTimeout(function() { var el = document.getElementById('termBody'); el.scrollTop = el.scrollHeight }, 10)
}

// Init buffer
termAPI.getInitBuffer().then(function(lines) {
  if (!lines) return
  for (var i = 0; i < lines.length; i++) appendLog(lines[i])
})

// Listen for logs
var unsub1 = termAPI.onLog('launch-log', appendLog)
var unsub2 = termAPI.onLog('setup-output', appendLog)

// Close → restore inline panels
document.getElementById('closeBtn').addEventListener('click', function() {
  termAPI.close()
})
</script>
</body>
</html>
